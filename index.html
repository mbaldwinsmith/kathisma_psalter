<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Read the complete Orthodox Psalter across 20 Kathismata and 60 Staseis. Offline-capable, mobile-first." />
  <title>Kathisma Psalter</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#2c1a0e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" href="./icons/icon-512.png" type="image/png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="preload" href="./fonts/EBGaramond-Regular.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="./fonts/EBGaramond-Italic.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="./fonts/EBGaramond-SemiBold.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/typography.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/animations.css" />
</head>
<body>
  <div id="app">
    <header id="top-bar" class="top-bar" role="banner">
      <a href="#/" class="top-bar__home" aria-label="Home">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M3 9.5L10 3l7 6.5V17a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      </a>
      <span id="top-bar__title" class="top-bar__title"></span>
      <a href="#/settings" class="top-bar__settings" aria-label="Settings">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </a>
    </header>

    <main id="main" role="main"></main>

    <div id="reader-bar" class="reader-bar" hidden aria-label="Reader controls">
      <button id="btn-prev" class="reader-bar__btn" aria-label="Previous stasis">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M13 4l-6 6 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="reader-bar__dots" id="stasis-dots" role="list" aria-label="Staseis in this kathisma"></div>
      <button id="btn-next" class="reader-bar__btn" aria-label="Next stasis">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M7 4l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="btn-complete" class="reader-bar__btn reader-bar__btn--complete" aria-label="Mark complete and continue">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M4 10l4 4 8-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
  <script type="module" src="./js/app.js?v=2"></script>
</body>
</html>
